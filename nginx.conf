# WebSocket upgrade: pass Connection: upgrade only when the client asked for
# an upgrade, plain keepalive otherwise.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Collab WebSocket (y-protocol sync, /api/collab/:dossierId). Needs the
    # HTTP/1.1 Upgrade handshake — without these headers nginx forwards the
    # request as a plain GET and the wss:// connection fails in prod (the vite
    # dev proxy handles this via `ws: true`, so it only breaks when deployed).
    location /api/collab/ {
        proxy_pass ${BACKEND_URL}/api/collab/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Long-lived connection; awareness heartbeats keep it active, but don't
        # let the general 120s API timeout cut an idle editing session.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Proxy API requests to the backend container
    location /api/ {
        # Image uploads may be up to 5 MB; nginx defaults to 1 MB
        client_max_body_size 10m;
        proxy_pass ${BACKEND_URL}/api/;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
