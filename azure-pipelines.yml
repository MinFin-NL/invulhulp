trigger:
  branches:
    include:
      - main

pool:
  name: alz-p-mgmt-we-ccoe-pool

variables:
  - group: invulhulp-secrets
  - name: BACKEND_IMAGE
    value: invulhulp-backend
  - name: FRONTEND_IMAGE
    value: invulhulp-frontend
  - name: RESOURCE_GROUP
    value: rg-invulhulp-inno-d
  - name: CONTAINER_APP_ENV
    value: cae-invulhulp-inno-d
  - name: BACKEND_APP
    value: ca-invulhulp-backend-inno-d
  - name: FRONTEND_APP
    value: ca-invulhulp-frontend-inno-d
  - name: KEYCLOAK_APP
    value: ca-keycloak-inno-d
  # Persistent storage for the backend (/data): LanceDB chunks + per-user
  # document store survive redeploys via an Azure Files share mounted on the
  # Container Apps environment.
  - name: STORAGE_ACCOUNT
    value: stinvulhulpinnod
  - name: FILE_SHARE
    value: invulhulp-data
  - name: STORAGE_MOUNT_NAME
    value: invulhulp-data
  # PUBLIC_URL (frontend external URL) is supplied by the invulhulp-secrets variable
  # group. It drives the OIDC redirect/logout URIs and must match the redirectUris
  # baked into the Keycloak findocs realm.


stages:
  - stage: Build
    displayName: Build and push images
    jobs:
      - job: Build
        displayName: Docker build and push to ACR
        steps:
          - task: AzureCLI@2
            displayName: Build and push backend
            env:
              IMAGE_TAG: $(Build.SourceVersion)
              BACKEND_IMAGE: $(BACKEND_IMAGE)
              RESOURCE_GROUP: $(RESOURCE_GROUP)
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                ACR_LOGIN_SERVER=$(az acr list --resource-group "$RESOURCE_GROUP" --query "[0].loginServer" -o tsv)
                az acr login --name "${ACR_LOGIN_SERVER%%.*}"
                docker build -f Dockerfile.backend \
                  -t "$ACR_LOGIN_SERVER/$BACKEND_IMAGE:$IMAGE_TAG" \
                  -t "$ACR_LOGIN_SERVER/$BACKEND_IMAGE:latest" .
                docker push "$ACR_LOGIN_SERVER/$BACKEND_IMAGE:$IMAGE_TAG"
                docker push "$ACR_LOGIN_SERVER/$BACKEND_IMAGE:latest"

          - task: AzureCLI@2
            displayName: Build and push frontend
            env:
              IMAGE_TAG: $(Build.SourceVersion)
              FRONTEND_IMAGE: $(FRONTEND_IMAGE)
              RESOURCE_GROUP: $(RESOURCE_GROUP)
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                ACR_LOGIN_SERVER=$(az acr list --resource-group "$RESOURCE_GROUP" --query "[0].loginServer" -o tsv)
                az acr login --name "${ACR_LOGIN_SERVER%%.*}"
                docker build -f Dockerfile.frontend \
                  -t "$ACR_LOGIN_SERVER/$FRONTEND_IMAGE:$IMAGE_TAG" \
                  -t "$ACR_LOGIN_SERVER/$FRONTEND_IMAGE:latest" .
                docker push "$ACR_LOGIN_SERVER/$FRONTEND_IMAGE:$IMAGE_TAG"
                docker push "$ACR_LOGIN_SERVER/$FRONTEND_IMAGE:latest"

  - stage: Deploy
    displayName: Deploy to Container Apps
    dependsOn: Build
    jobs:
      - job: Deploy
        displayName: Deploy backend and frontend
        steps:
          - task: AzureCLI@2
            displayName: Provision persistent storage
            env:
              RESOURCE_GROUP: $(RESOURCE_GROUP)
              CONTAINER_APP_ENV: $(CONTAINER_APP_ENV)
              STORAGE_ACCOUNT: $(STORAGE_ACCOUNT)
              FILE_SHARE: $(FILE_SHARE)
              STORAGE_MOUNT_NAME: $(STORAGE_MOUNT_NAME)
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                LOCATION=$(az group show --name "$RESOURCE_GROUP" --query location -o tsv)

                # Idempotent: create returns the existing account unchanged.
                az storage account create \
                  --name "$STORAGE_ACCOUNT" \
                  --resource-group "$RESOURCE_GROUP" \
                  --location "$LOCATION" \
                  --sku Standard_LRS \
                  --kind StorageV2 \
                  --min-tls-version TLS1_2 \
                  --output none

                STORAGE_KEY=$(az storage account keys list \
                  --account-name "$STORAGE_ACCOUNT" \
                  --resource-group "$RESOURCE_GROUP" \
                  --query "[0].value" -o tsv)

                az storage share-rm create \
                  --storage-account "$STORAGE_ACCOUNT" \
                  --resource-group "$RESOURCE_GROUP" \
                  --name "$FILE_SHARE" \
                  --quota 16 \
                  --output none

                # Register the share on the Container Apps environment so apps
                # can mount it as an AzureFile volume.
                az containerapp env storage set \
                  --name "$CONTAINER_APP_ENV" \
                  --resource-group "$RESOURCE_GROUP" \
                  --storage-name "$STORAGE_MOUNT_NAME" \
                  --azure-file-account-name "$STORAGE_ACCOUNT" \
                  --azure-file-account-key "$STORAGE_KEY" \
                  --azure-file-share-name "$FILE_SHARE" \
                  --access-mode ReadWrite \
                  --output none

          - task: AzureCLI@2
            displayName: Deploy backend
            env:
              IMAGE_TAG: $(Build.SourceVersion)
              BACKEND_IMAGE: $(BACKEND_IMAGE)
              BACKEND_APP: $(BACKEND_APP)
              RESOURCE_GROUP: $(RESOURCE_GROUP)
              CONTAINER_APP_ENV: $(CONTAINER_APP_ENV)
              STORAGE_MOUNT_NAME: $(STORAGE_MOUNT_NAME)
              AZURE_OPENAI_EMBEDDING_ENDPOINT: $(AZURE_OPENAI_EMBEDDING_ENDPOINT)
              AZURE_OPENAI_EMBEDDING_API_KEY: $(AZURE_OPENAI_EMBEDDING_API_KEY)
              KEYCLOAK_APP: $(KEYCLOAK_APP)
              # From the invulhulp-secrets variable group. OIDC_CLIENT_SECRET MUST
              # equal Keycloak's FINDOCS_BFF_CLIENT_SECRET.
              PUBLIC_URL: $(PUBLIC_URL)
              OIDC_CLIENT_SECRET: $(OIDC_CLIENT_SECRET)
              SESSION_SECRET: $(SESSION_SECRET)
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                ACR_LOGIN_SERVER=$(az acr list --resource-group "$RESOURCE_GROUP" --query "[0].loginServer" -o tsv)
                ACR_NAME="${ACR_LOGIN_SERVER%%.*}"
                ACR_USER=$(az acr credential show --name "$ACR_NAME" --query username -o tsv)
                ACR_PASS=$(az acr credential show --name "$ACR_NAME" --query "passwords[0].value" -o tsv)

                # OIDC discovery points at the Keycloak app the keycloak pipeline
                # deploys into this same environment. Its FQDN isn't known until it
                # exists, so look it up at deploy time.
                KC_FQDN=$(az containerapp show --name "$KEYCLOAK_APP" --resource-group "$RESOURCE_GROUP" --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || true)
                if [ -z "$KC_FQDN" ]; then
                  echo "##[error]Keycloak app '$KEYCLOAK_APP' not found in $RESOURCE_GROUP. Deploy the keycloak pipeline first." >&2
                  exit 1
                fi
                OIDC_DISCOVERY_URL="https://${KC_FQDN}/realms/findocs/.well-known/openid-configuration"
                echo "Using Keycloak discovery: $OIDC_DISCOVERY_URL"

                if az containerapp show --name "$BACKEND_APP" --resource-group "$RESOURCE_GROUP" &>/dev/null; then
                  az containerapp secret set \
                    --name "$BACKEND_APP" \
                    --resource-group "$RESOURCE_GROUP" \
                    --secrets \
                      "openai-embedding-endpoint=${AZURE_OPENAI_EMBEDDING_ENDPOINT}" \
                      "openai-embedding-api-key=${AZURE_OPENAI_EMBEDDING_API_KEY}" \
                      "oidc-client-secret=${OIDC_CLIENT_SECRET}" \
                      "session-secret=${SESSION_SECRET}"

                  az containerapp update \
                    --name "$BACKEND_APP" \
                    --resource-group "$RESOURCE_GROUP" \
                    --image "$ACR_LOGIN_SERVER/$BACKEND_IMAGE:$IMAGE_TAG" \
                    --min-replicas 1 \
                    --max-replicas 1 \
                    --set-env-vars \
                      "CORS_ORIGINS=*" \
                      "LANCEDB_PATH=/data/lancedb" \
                      "DOCS_PATH=/data/docs" \
                      "AZURE_OPENAI_ENDPOINT=secretref:openai-endpoint" \
                      "AZURE_OPENAI_DEPLOYMENT=gpt-5.3-chat" \
                      "AZURE_OPENAI_API_VERSION=2025-04-01-preview" \
                      "AZURE_OPENAI_API_KEY=secretref:openai-api-key" \
                      "AZURE_OPENAI_EMBEDDING_ENDPOINT=secretref:openai-embedding-endpoint" \
                      "AZURE_OPENAI_EMBEDDING_API_KEY=secretref:openai-embedding-api-key" \
                      "AZURE_OPENAI_EMBEDDING_DEPLOYMENT=text-embedding-3-large" \
                      "AZURE_OPENAI_EMBEDDING_API_VERSION=2024-02-01" \
                      "OIDC_DISCOVERY_URL=${OIDC_DISCOVERY_URL}" \
                      "OIDC_CLIENT_ID=findocs-bff" \
                      "OIDC_CLIENT_SECRET=secretref:oidc-client-secret" \
                      "OIDC_REDIRECT_URI=${PUBLIC_URL}/api/auth/callback" \
                      "OIDC_POST_LOGIN_REDIRECT=${PUBLIC_URL}/" \
                      "OIDC_POST_LOGOUT_REDIRECT=${PUBLIC_URL}/" \
                      "SESSION_SECRET=secretref:session-secret" \
                      "SESSION_HTTPS_ONLY=true"
                else
                  az containerapp create \
                    --name "$BACKEND_APP" \
                    --resource-group "$RESOURCE_GROUP" \
                    --environment "$CONTAINER_APP_ENV" \
                    --image "$ACR_LOGIN_SERVER/$BACKEND_IMAGE:$IMAGE_TAG" \
                    --registry-server "$ACR_LOGIN_SERVER" \
                    --registry-username "$ACR_USER" \
                    --registry-password "$ACR_PASS" \
                    --ingress internal \
                    --target-port 8000 \
                    --env-vars \
                      "CORS_ORIGINS=*" \
                      "LANCEDB_PATH=/data/lancedb" \
                      "DOCS_PATH=/data/docs" \
                      "AZURE_OPENAI_ENDPOINT=secretref:openai-endpoint" \
                      "AZURE_OPENAI_DEPLOYMENT=gpt-5.3-chat" \
                      "AZURE_OPENAI_API_VERSION=2025-04-01-preview" \
                      "AZURE_OPENAI_API_KEY=secretref:openai-api-key" \
                      "AZURE_OPENAI_EMBEDDING_ENDPOINT=secretref:openai-embedding-endpoint" \
                      "AZURE_OPENAI_EMBEDDING_API_KEY=secretref:openai-embedding-api-key" \
                      "AZURE_OPENAI_EMBEDDING_DEPLOYMENT=text-embedding-3-large" \
                      "AZURE_OPENAI_EMBEDDING_API_VERSION=2024-02-01" \
                      "OIDC_DISCOVERY_URL=${OIDC_DISCOVERY_URL}" \
                      "OIDC_CLIENT_ID=findocs-bff" \
                      "OIDC_CLIENT_SECRET=secretref:oidc-client-secret" \
                      "OIDC_REDIRECT_URI=${PUBLIC_URL}/api/auth/callback" \
                      "OIDC_POST_LOGIN_REDIRECT=${PUBLIC_URL}/" \
                      "OIDC_POST_LOGOUT_REDIRECT=${PUBLIC_URL}/" \
                      "SESSION_SECRET=secretref:session-secret" \
                      "SESSION_HTTPS_ONLY=true" \
                    --secrets \
                      "openai-endpoint=" \
                      "openai-api-key=" \
                      "openai-embedding-endpoint=${AZURE_OPENAI_EMBEDDING_ENDPOINT}" \
                      "openai-embedding-api-key=${AZURE_OPENAI_EMBEDDING_API_KEY}" \
                      "oidc-client-secret=${OIDC_CLIENT_SECRET}" \
                      "session-secret=${SESSION_SECRET}" \
                    --cpu 0.5 --memory 1.0Gi \
                    --min-replicas 1 --max-replicas 1
                fi

                # Mount the Azure Files share at /data. The CLI has no flag for
                # volume mounts, so patch the app definition via --yaml (the
                # show output in JSON is valid YAML). Idempotent per deploy.
                az containerapp show \
                  --name "$BACKEND_APP" \
                  --resource-group "$RESOURCE_GROUP" \
                  -o json > /tmp/backend-app.json
                python3 - "$STORAGE_MOUNT_NAME" <<'PY'
                import json, sys
                mount_name = sys.argv[1]
                with open("/tmp/backend-app.json") as f:
                    app = json.load(f)
                template = app["properties"]["template"]
                template["volumes"] = [
                    {"name": "data", "storageName": mount_name, "storageType": "AzureFile"}
                ]
                for container in template["containers"]:
                    container["volumeMounts"] = [{"volumeName": "data", "mountPath": "/data"}]
                with open("/tmp/backend-app.json", "w") as f:
                    json.dump(app, f)
                PY
                az containerapp update \
                  --name "$BACKEND_APP" \
                  --resource-group "$RESOURCE_GROUP" \
                  --yaml /tmp/backend-app.json \
                  --output none

                az containerapp ingress access-restriction remove \
                  --name "$BACKEND_APP" \
                  --resource-group "$RESOURCE_GROUP" \
                  --rule-name "DWR Next werkplekken" 2>/dev/null || true
                az containerapp ingress access-restriction remove \
                  --name "$BACKEND_APP" \
                  --resource-group "$RESOURCE_GROUP" \
                  --rule-name "ITS" 2>/dev/null || true


          - task: AzureCLI@2
            displayName: Deploy frontend
            env:
              IMAGE_TAG: $(Build.SourceVersion)
              FRONTEND_IMAGE: $(FRONTEND_IMAGE)
              FRONTEND_APP: $(FRONTEND_APP)
              BACKEND_APP: $(BACKEND_APP)
              RESOURCE_GROUP: $(RESOURCE_GROUP)
              CONTAINER_APP_ENV: $(CONTAINER_APP_ENV)
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                ACR_LOGIN_SERVER=$(az acr list --resource-group "$RESOURCE_GROUP" --query "[0].loginServer" -o tsv)
                ACR_NAME="${ACR_LOGIN_SERVER%%.*}"
                ACR_USER=$(az acr credential show --name "$ACR_NAME" --query username -o tsv)
                ACR_PASS=$(az acr credential show --name "$ACR_NAME" --query "passwords[0].value" -o tsv)

                BACKEND_FQDN=$(az containerapp show \
                  --name "$BACKEND_APP" \
                  --resource-group "$RESOURCE_GROUP" \
                  --query "properties.configuration.ingress.fqdn" -o tsv)
                BACKEND_URL="https://${BACKEND_FQDN}"

                if az containerapp show --name "$FRONTEND_APP" --resource-group "$RESOURCE_GROUP" &>/dev/null; then
                  az containerapp update \
                    --name "$FRONTEND_APP" \
                    --resource-group "$RESOURCE_GROUP" \
                    --image "$ACR_LOGIN_SERVER/$FRONTEND_IMAGE:$IMAGE_TAG" \
                    --min-replicas 1 \
                    --set-env-vars "BACKEND_URL=${BACKEND_URL}"
                else
                  az containerapp create \
                    --name "$FRONTEND_APP" \
                    --resource-group "$RESOURCE_GROUP" \
                    --environment "$CONTAINER_APP_ENV" \
                    --image "$ACR_LOGIN_SERVER/$FRONTEND_IMAGE:$IMAGE_TAG" \
                    --registry-server "$ACR_LOGIN_SERVER" \
                    --registry-username "$ACR_USER" \
                    --registry-password "$ACR_PASS" \
                    --ingress external \
                    --target-port 80 \
                    --env-vars "BACKEND_URL=${BACKEND_URL}" \
                    --cpu 0.25 --memory 0.5Gi \
                    --min-replicas 1 --max-replicas 3
                fi

          - task: AzureCLI@2
            displayName: Apply firewall rules to frontend
            env:
              FRONTEND_APP: $(FRONTEND_APP)
              RESOURCE_GROUP: $(RESOURCE_GROUP)
              ALLOWED_IP_1: $(ALLOWED_IP_1)
              ALLOWED_IP_2: $(ALLOWED_IP_2)
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az containerapp ingress access-restriction set \
                  --name "$FRONTEND_APP" \
                  --resource-group "$RESOURCE_GROUP" \
                  --rule-name "DWR Next werkplekken" \
                  --ip-address "$ALLOWED_IP_1" \
                  --action Allow
                az containerapp ingress access-restriction set \
                  --name "$FRONTEND_APP" \
                  --resource-group "$RESOURCE_GROUP" \
                  --rule-name "ITS" \
                  --ip-address "$ALLOWED_IP_2" \
                  --action Allow
